<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      .node { fill: #c0c0c0; }
      .line { stroke: #c0c0c0; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a1a" rx="4"/>
  
  <!-- Connection lines -->
  <line x1="9.6" y1="8" x2="16" y2="16" class="line"/>
  <line x1="22.4" y1="8" x2="16" y2="16" class="line"/>
  <line x1="24" y1="11.2" x2="16" y2="16" class="line"/>
  <line x1="9.6" y1="20.8" x2="16" y2="16" class="line"/>
  <line x1="16" y1="20.8" x2="16" y2="16" class="line"/>
  <line x1="22.4" y1="20.8" x2="16" y2="16" class="line"/>
  
  <!-- Central node -->
  <circle cx="16" cy="16" r="1" class="node"/>
  
  <!-- Outer nodes -->
  <circle cx="9.6" cy="8" r="0.8" class="node"/>
  <circle cx="22.4" cy="8" r="0.8" class="node"/>
  <circle cx="24" cy="11.2" r="0.8" class="node"/>
  <circle cx="9.6" cy="20.8" r="0.8" class="node"/>
  <circle cx="16" cy="20.8" r="0.8" class="node"/>
  <circle cx="22.4" cy="20.8" r="0.8" class="node"/>
</svg>
