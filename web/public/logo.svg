<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .node { fill: #c0c0c0; }
      .line { stroke: #c0c0c0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>
  
  <!-- Connection lines -->
  <line x1="60" y1="50" x2="100" y2="100" class="line"/>
  <line x1="140" y1="50" x2="100" y2="100" class="line"/>
  <line x1="150" y1="70" x2="100" y2="100" class="line"/>
  <line x1="60" y1="130" x2="100" y2="100" class="line"/>
  <line x1="100" y1="130" x2="100" y2="100" class="line"/>
  <line x1="140" y1="130" x2="100" y2="100" class="line"/>
  <line x1="130" y1="70" x2="150" y2="70" class="line"/>
  <line x1="130" y1="70" x2="120" y2="100" class="line"/>
  <line x1="120" y1="100" x2="100" y2="130" class="line"/>
  <line x1="120" y1="100" x2="140" y2="130" class="line"/>
  <line x1="100" y1="130" x2="80" y2="150" class="line"/>
  <line x1="140" y1="130" x2="160" y2="150" class="line"/>
  
  <!-- Central node (larger) -->
  <circle cx="100" cy="100" r="6" class="node" filter="url(#shadow)"/>
  
  <!-- Outer nodes -->
  <circle cx="60" cy="50" r="4" class="node"/>
  <circle cx="140" cy="50" r="4" class="node"/>
  <circle cx="150" cy="70" r="4" class="node"/>
  <circle cx="130" cy="70" r="4" class="node"/>
  <circle cx="60" cy="130" r="4" class="node"/>
  <circle cx="100" cy="130" r="4" class="node"/>
  <circle cx="140" cy="130" r="4" class="node"/>
  <circle cx="120" cy="100" r="4" class="node"/>
  <circle cx="80" cy="150" r="4" class="node"/>
  <circle cx="160" cy="150" r="4" class="node"/>
  
  <!-- Gradient for 3D effect -->
  <defs>
    <radialGradient id="nodeGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#c0c0c0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1"/>
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
